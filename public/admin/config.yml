# Sveltia CMS 설정 — 관리자 화면(/admin)의 폼을 정의한다.
# 배포 후 GitHub 저장소 정보를 채우세요.

backend:
  name: github
  repo: hwanyun/hwanyun.com
  branch: main

# 로컬에서 관리자 화면 테스트 시 아래 주석 해제 + `npx @sveltia/cms proxy` 실행
# local_backend: true

media_folder: "public/images" # 업로드 이미지 저장 위치 (저장소 루트 = site 폴더 기준)
public_folder: "/images" # 사이트에서 참조되는 경로

locale: ko

collections:
  - name: works
    label: "작품 (Works)"
    label_singular: "작품"
    folder: "src/content/works"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [order, title, year]
    fields:
      - { name: title, label: "제목", widget: string }
      - { name: year, label: "연도", widget: string, required: false }
      - { name: medium, label: "매체 표기", widget: string, required: false }
      - name: size
        label: "카드 크기"
        widget: select
        options:
          - { label: "작게 (1col · 220px)", value: "1col" }
          - { label: "보통 (2col · 380px)", value: "2col" }
          - { label: "크게 (3col · 540px)", value: "3col" }
        default: "2col"
      - name: category
        label: "카테고리"
        widget: select
        options:
          - { label: "Work", value: "work" }
          - { label: "Sound", value: "sound" }
        default: "work"
      - { name: order, label: "순서 (작을수록 앞)", widget: number, value_type: int, default: 100 }
      - { name: thumb, label: "홈 썸네일", widget: image, required: false }
      - { name: textEn, label: "설명 (영문)", widget: text, required: false }
      - { name: textKr, label: "설명 (국문)", widget: text, required: false }
      - name: series
        label: "연작 연결 (Series)"
        widget: object
        required: false
        hint: "같은 연작의 모든 작품에 동일한 연작 ID와 연작명을 입력하면 작품 페이지에서 자동으로 서로 연결됩니다."
        fields:
          - { name: id, label: "연작 ID", widget: string, hint: "영문 소문자·하이픈 사용. 예: intuition-untitled" }
          - { name: label, label: "연작명", widget: string, hint: "예: Intuition: Untitled" }
      - name: media
        label: "세부 이미지 · 영상"
        label_singular: "미디어"
        widget: list
        required: false
        summary: "{{fields.type}} · {{fields.width}}"
        fields:
          - name: type
            label: "종류"
            widget: select
            options:
              - { label: "이미지", value: image }
              - { label: "영상", value: video }
            default: image
          - { name: src, label: "이미지 업로드 / 영상 URL(YouTube·Vimeo·mp4)", widget: string }
          - name: width
            label: "폭"
            widget: select
            options:
              - { label: "전체폭", value: full }
              - { label: "반폭", value: half }
              - { label: "1/3폭", value: third }
            default: full
          - name: ratio
            label: "영상 비율 (영상만)"
            widget: select
            required: false
            options: ["16:9", "4:3", "1:1", "21:9", "9:16"]
            default: "16:9"
          - { name: caption, label: "캡션", widget: string, required: false }
      - name: sponsors
        label: "전시 협력·후원 (Sponsors)"
        label_singular: "협력기관"
        widget: list
        required: false
        summary: "{{fields.name}}"
        fields:
          - { name: name, label: "기관명", widget: string }
          - { name: logo, label: "로고 이미지", widget: image }
          - { name: url, label: "웹사이트 URL", widget: string, required: false }
      - { name: draft, label: "비공개(초안)", widget: boolean, default: false }
      - { name: body, label: "추가 설명 (마크다운)", widget: markdown, required: false }

  - name: sounds
    label: "사운드 (Sound)"
    label_singular: "사운드"
    folder: "src/content/sounds"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [order, title, year]
    fields:
      - { name: title, label: "제목", widget: string }
      - { name: year, label: "연도", widget: string, required: false }
      - { name: audio, label: "오디오 파일 URL", widget: string, required: false, hint: "R2 또는 /audio 경로의 mp3·m4a·wav URL. 사이트 자체 플레이어가 직접 재생합니다." }
      - { name: url, label: "기존 SoundCloud 주소 (기록용)", widget: string, required: false, hint: "사이트에는 노출되지 않습니다." }
      - name: section
        label: "아카이브 구분"
        widget: select
        options:
          - { label: "Sound Works", value: works }
          - { label: "Scores & Collaborations", value: scores }
          - { label: "Studies & Archive", value: archive }
        default: archive
      - { name: project, label: "작업 묶음", widget: string, required: false, hint: "같은 작업의 여러 버전을 묶는 제목" }
      - { name: cover, label: "커버 이미지", widget: image, required: false }
      - name: size
        label: "카드 크기"
        widget: select
        options:
          - { label: "작게 (1col · 220px)", value: "1col" }
          - { label: "보통 (2col · 380px)", value: "2col" }
          - { label: "크게 (3col · 540px)", value: "3col" }
        default: "2col"
      - { name: order, label: "순서 (작을수록 앞)", widget: number, value_type: int, default: 100 }
      - { name: draft, label: "비공개(초안)", widget: boolean, default: false }
      - { name: body, label: "설명", widget: markdown, required: false }
